<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Buat Formulir Pendaftaran</title>
</head>
<body>
    <h1>Formulir Pendaftaran</h1>

    <form action="">
        <label for="nisn">NISN:</label>
        <input type="text" id="nisn" name="nisn" placeholder="Masukkan NISN">
        <br><br>

        <label for="nama">Nama:</label>
        <input type="text" id="nama" name="nama" placeholder="Masukkan Nama Lengkap">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="contoh@email.com">
        <br><br>

        <label for="pass">Password:</label>
        <input type="password" id="pass" name="pass" placeholder="Masukkan Password">
        <br><br>

        <label for="tlp">Telepon:</label>
        <input type="tel" id="tlp" name="tlp" placeholder="08123456789">
        <br><br>

        <label for="alamat">Alamat:</label><br>
        <textarea id="alamat" name="alamat" rows="5" placeholder="Masukkan alamat lengkap"></textarea>
        <br><br>

        <label for="file">File:</label>
        <input type="file" name="file" id="">
        <br><br>

        <label for="jenis">Jenis Kelamin</label>
        <input type="radio" name="jenis" id="laki-laki">
        <label for="laki-laki">Laki-Laki</label>
        <input type="radio" name="jenis" id="perempuan">
        <label for="perempuan">Perempuan</label>
        <br><br>

        <label for="jenis">Jenis Kelamin</label>
        <select name="jenis" id="">
            <option value="">Laki-Laki</option>
            <option value="">Perempuan</option>
        </select>
        <br><br>

        <button type="submit">Daftar Sekarang</button>
    </form>
</body>
</html>
